[phases.setup]
nixPkgs = [
  "chromium",
  "chromium-unwrapped", 
  "nss",
  "nspr",
  "atk",
  "cups",
  "libdrm",
  "dbus",
  "libxkbcommon",
  "pango",
  "cairo",
  "xorg.libX11",
  "xorg.libXcomposite",
  "xorg.libXdamage",
  "xorg.libXext",
  "xorg.libXfixes",
  "xorg.libXrandr",
  "mesa",
  "expat",
  "alsa-lib",
  "glib",
  "gtk3",
  "at-spi2-atk",
  "at-spi2-core"
]

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "playwright install chromium --with-deps"
]

[start]
cmd = "python server.py"
